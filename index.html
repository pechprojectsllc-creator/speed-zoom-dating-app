<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Speed Dating</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin:0; background: linear-gradient(135deg, #6a11cb, #2575fc); color:white; text-align:center; min-height:100vh; }
        .container { max-width: 520px; margin: 20px auto; padding: 20px; }
        button { background:white; color:#2575fc; border:none; padding:14px 28px; margin:10px; border-radius:50px; font-weight:600; cursor:pointer; }
        .card { background: rgba(255,255,255,0.15); border-radius: 16px; padding: 20px; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zoom Speed Dating</h1>
        <p>Real Events • Real Zoom Dates</p>

        <div id="authScreen" class="card">
            <input type="email" id="email" placeholder="Email" value="demo@zoomspeeddating.com"><br><br>
            <button onclick="register()">Register - $20</button>
            <button onclick="login()">Login</button>
        </div>

        <div id="mainScreen" style="display:none;">
            <button onclick="createEvent()">Create Event (Admin)</button>
            <button onclick="joinEvent()">Join Event</button>
            <button onclick="getZoomLink()">Get Zoom Link</button>
            <div id="status" class="card"></div>
        </div>
    </div>

    <script>
        const API = ''; // Will be updated after deployment

        function register() {
            const email = document.getElementById('email').value;
            fetch('/api/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email}) })
            .then(r => r.json())
            .then(data => { alert(data.message); showMain(); });
        }

        function login() {
            const email = document.getElementById('email').value;
            fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email}) })
            .then(r => r.json())
            .then(data => { alert(data.message || data.error); showMain(); });
        }

        function showMain() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
        }

        function createEvent() { fetch('/api/events', {method:'POST'}).then(()=> addStatus('Event created!')); }
        function joinEvent() { fetch('/api/join/1', {method:'POST'}).then(()=> addStatus('Joined! Check your email for Zoom details.')); }
        function getZoomLink() { fetch('/api/zoom-link').then(r=>r.json()).then(d => addStatus('Zoom Link: <a href="'+d.zoom_link+'" target="_blank">Join Now</a>')); }

        function addStatus(msg) {
            document.getElementById('status').innerHTML = msg;
        }
    </script>
</body>
</html>
